name: Reproduce market-making sample

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    name: Real-data sample artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,research]"
      - name: Download public LOBSTER sample
        run: make fetch-order-book-data
      - name: Reproduce chronological study
        run: make reproduce-market-making-sample
      - name: Execute start-here notebook
        run: make market-making-notebook
      - name: Generate PDF artifacts
        run: make market-making-paper
      - name: Upload aggregate research artifacts
        uses: actions/upload-artifact@v6
        with:
          name: market-making-sample-artifacts
          path: |
            reports/market_making_sample/
            notebooks/start_here_market_making.ipynb
            output/pdf/
          retention-days: 7
